<div class="container">

    <div class="header">

        <h2>Employee List</h2>

        <button>

            Add Employee

        </button>

    </div>

    <table>

        <thead>

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Email</th>

                <th>Department</th>

                <th>Designation</th>

                <th>Salary</th>

                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let employee of employees">

                <td>{{employee.emp_id}}</td>

                <td>{{employee.first_name}}</td>

                <td>{{employee.email}}</td>

                <td>{{employee.department}}</td>

                <td>{{employee.designation}}</td>

                <td>{{employee.salary}}</td>

                <td>

                    <button class="view">

                        View

                    </button>

                    <button class="edit">

                        Edit

                    </button>

                    <button class="delete">

                        Delete

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>
